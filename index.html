<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Orion Map Demo</title>
  <!-- Orion Map Styles v1.0 | Street Dynamics | Map ID: fd49d1035c87f47ce253f8de | v9 -->
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --slate-950: #020617; --slate-700: #334155;
      --blue-900: #003366; --blue-800: #004a94; --blue-700: #0057b4;
      --blue-600: #006edf; --blue-400: #20a8ff; --blue-300: #6dc6ff;
      --blue-200: #b2dfff; --blue-100: #dceeff;
    }
    body { font-family: 'IBM Plex Sans', sans-serif; background: var(--slate-950); color: var(--blue-100); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 54px; background: var(--slate-950); border-bottom: 1px solid rgba(109,198,255,0.10); flex-shrink: 0; z-index: 10; }
    .logo img { height: 32px; width: auto; display: block; mix-blend-mode: screen; }
    .header-title { font-size: 15px; font-weight: 500; color: var(--blue-100); letter-spacing: 0.03em; }
    .header-badge { font-size: 10px; font-weight: 500; background: rgba(0,110,223,0.15); color: var(--blue-300); border: 1px solid rgba(0,110,223,0.25); border-radius: 5px; padding: 3px 10px; letter-spacing: 0.05em; }

    .layout { flex: 1; display: flex; overflow: hidden; }

    .sidebar { width: 256px; flex-shrink: 0; background: rgba(4,10,26,0.98); border-right: 1px solid rgba(109,198,255,0.09); display: flex; flex-direction: column; overflow: hidden; }

    /* Search fix - standalone PAE no wrapper box */
    .search-wrap { padding: 10px 12px; border-bottom: 1px solid rgba(109,198,255,0.07); }
    #pac-input {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(109,198,255,0.12);
      border-radius: 5px;
      padding: 6px 10px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--blue-200);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      display: block;
    }
    #pac-input::placeholder { color: var(--slate-700); }
    #pac-input:focus { border-color: rgba(109,198,255,0.30); background: rgba(109,198,255,0.04); }

    /* Autocomplete dropdown */
    .pac-container {
      background: rgba(4,10,26,0.98) !important;
      border: 1px solid rgba(109,198,255,0.18) !important;
      border-radius: 7px !important;
      margin-top: 3px;
      font-family: 'IBM Plex Sans', sans-serif !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55) !important;
      overflow: hidden;
    }
    .pac-item {
      padding: 6px 10px !important;
      color: var(--blue-200) !important;
      font-size: 11px !important;
      border-top: 1px solid rgba(109,198,255,0.06) !important;
      cursor: pointer;
      background: transparent;
    }
    .pac-item:hover, .pac-item-selected { background: rgba(109,198,255,0.07) !important; }
    .pac-item-query { color: var(--blue-100) !important; font-size: 11px !important; }
    .pac-matched { color: var(--blue-400) !important; font-weight: 600; }
    .pac-icon, .pac-icon-marker { display: none !important; }
    .pac-logo:after { display: none !important; }
    .hdpi .pac-icon { display: none !important; }

    .sb-section { padding: 10px 12px 8px; }
    .sb-title { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--slate-700); margin-bottom: 6px; }

    .group-item { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 6px; cursor: pointer; transition: background 0.15s; user-select: none; }
    .group-item:hover { background: rgba(109,198,255,0.05); }
    .group-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: opacity 0.2s; }
    .group-item.off .group-dot { opacity: 0.2; }
    .group-name { font-size: 12px; color: var(--blue-200); flex: 1; transition: color 0.2s; }
    .group-item.off .group-name { color: var(--slate-700); }
    .group-count { font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: var(--slate-700); background: rgba(255,255,255,0.04); padding: 1px 6px; border-radius: 3px; }
    .group-eye { font-size: 11px; color: var(--slate-700); }

    .divider { border: none; border-top: 1px solid rgba(109,198,255,0.07); margin: 2px 12px; }

    .toggle-row { display: flex; gap: 6px; }
    #style-toggle .tog-btn { font-size: 10px; padding: 6px 2px; }
    .tog-btn.disabled-hybrid { opacity: 0.3; pointer-events: none; cursor: not-allowed; }
    .tog-btn { flex: 1; font-family: 'IBM Plex Sans', sans-serif; font-size: 11px; font-weight: 500; padding: 6px 0; border-radius: 5px; border: 1px solid rgba(109,198,255,0.12); cursor: pointer; transition: all 0.2s; background: transparent; color: var(--slate-700); text-align: center; }
    .tog-btn.active { background: var(--blue-800); color: var(--blue-100); border-color: var(--blue-700); }
    .tog-btn:hover:not(.active) { border-color: rgba(109,198,255,0.25); color: var(--blue-300); }

    .layer-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .layer-btn { flex: 1; min-width: 60px; font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 500; padding: 5px 4px; border-radius: 5px; border: 1px solid rgba(109,198,255,0.12); cursor: pointer; transition: all 0.2s; background: transparent; color: var(--slate-700); text-align: center; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .layer-btn.active { background: rgba(0,74,148,0.4); color: var(--blue-200); border-color: var(--blue-600); }
    .layer-btn:hover:not(.active) { border-color: rgba(109,198,255,0.25); color: var(--blue-300); }
    .layer-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    .stat-grid { display: flex; flex-direction: column; }
    .stat-row { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid rgba(109,198,255,0.05); }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { font-size: 10px; color: var(--slate-700); }
    .stat-val { font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: var(--blue-300); max-width: 140px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Location detail panel */
    .detail-panel { margin: 0 12px 8px; border-radius: 7px; overflow: hidden; background: rgba(255,255,255,0.03); border: 1px solid rgba(109,198,255,0.12); display: none; }
    .detail-panel.visible { display: block; }
    .detail-sv { width: 100%; height: 90px; display: block; overflow: hidden; background: rgba(0,0,0,0.3); position: relative; }
    .detail-body { padding: 8px 10px; }
    .detail-name { font-size: 12px; font-weight: 600; color: var(--blue-200); margin-bottom: 4px; }
    .detail-rows { display: flex; flex-direction: column; gap: 2px; }
    .detail-row { display: flex; justify-content: space-between; font-size: 10px; }
    .detail-key { color: var(--slate-700); }
    .detail-val { color: var(--blue-300); font-family: 'IBM Plex Mono', monospace; }

    .log-wrap { flex: 1; padding: 0 12px 12px; overflow-y: auto; min-height: 0; }
    .log-item { font-size: 10px; padding: 3px 0; border-bottom: 1px solid rgba(109,198,255,0.04); display: flex; gap: 6px; align-items: baseline; }
    .log-item:last-child { border-bottom: none; }
    .log-time { color: rgba(51,65,85,0.55); flex-shrink: 0; font-family: 'IBM Plex Mono', monospace; font-size: 9px; }
    .log-text { color: var(--slate-700); line-height: 1.4; }
    .log-text.hi { color: var(--blue-300); }

    .map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }
    .version-badge { position: absolute; bottom: 8px; left: 8px; font-size: 9px; font-family: 'IBM Plex Mono', monospace; color: rgba(74,222,128,0.65); z-index: 10; pointer-events: none; letter-spacing: 0.08em; user-select: none; }

    /* Map popup card */
    .map-popup {
      position: absolute;
      bottom: 56px;
      left: 16px;
      width: 272px;
      background: rgba(3,8,22,0.96);
      border: 1px solid rgba(109,198,255,0.20);
      border-radius: 10px;
      overflow: hidden;
      z-index: 50;
      display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(109,198,255,0.05);
      backdrop-filter: blur(12px);
      animation: popup-in 0.22s ease;
    }
    @keyframes popup-in {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .map-popup.visible { display: block; }
    .map-popup-sv { width: 100%; height: 155px; overflow: hidden; background: rgba(0,0,0,0.4); position: relative; display: flex; align-items: center; justify-content: center; }
    .map-popup-sv-inner { width: 100%; height: 100%; }
    .map-popup-sv-none { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; color: #334155; text-transform: uppercase; }
    .map-popup-body { padding: 10px 12px 12px; }
    .map-popup-name { font-size: 13px; font-weight: 600; color: var(--blue-100); margin-bottom: 7px; line-height: 1.2; }
    .map-popup-rows { display: flex; flex-direction: column; gap: 3px; }
    .map-popup-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 10px; }
    .map-popup-key { color: var(--slate-700); }
    .map-popup-val { color: var(--blue-300); font-family: 'IBM Plex Mono', monospace; font-size: 10px; max-width: 160px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .map-popup-close {
      position: absolute; top: 8px; right: 8px;
      width: 24px; height: 24px;
      background: rgba(0,0,0,0.55); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--blue-200); font-size: 13px;
      z-index: 51; border: 1px solid rgba(109,198,255,0.15);
      transition: background 0.15s;
    }
    .map-popup-close:hover { background: rgba(0,74,148,0.7); }

    /* Toast */
    .toast { position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(4,10,26,0.95); border: 1px solid rgba(109,198,255,0.25); border-radius: 8px; padding: 10px 18px; font-size: 12px; color: var(--blue-200); z-index: 100; opacity: 0; pointer-events: none; transition: all 0.3s ease; white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Pulse animation */
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(2.2); opacity: 0; }
    }
    .pulse-marker { position: relative; }
    .pulse-marker::before { content: ''; position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; margin: -15px; border-radius: 50%; background: rgba(32,168,255,0.35); animation: pulse-ring 1.8s ease-out infinite; }

    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo {
      display: flex; align-items: center; gap: 14px; margin-bottom: 48px;
    }
    .splash-logo-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, #00d4ff, #0088bb);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 32px rgba(0,212,255,0.4);
    }
    .splash-logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px; font-weight: 700;
      letter-spacing: 4px; color: #ddeeff;
    }
    .splash-logo-text span { color: #00d4ff; }
    .splash-sub {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; letter-spacing: 3px; color: #6a8fad;
      text-transform: uppercase; margin-top: 2px;
    }
    .splash-form {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      width: 280px;
    }
    .splash-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; letter-spacing: 3px;
      color: #6a8fad; text-transform: uppercase;
      align-self: flex-start;
    }
    .splash-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(109,198,255,0.2);
      border-radius: 6px;
      padding: 11px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 14px; letter-spacing: 3px;
      color: #00d4ff; outline: none;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .splash-input:focus {
      border-color: rgba(0,212,255,0.5);
      box-shadow: 0 0 18px rgba(0,212,255,0.12);
    }
    .splash-input.error {
      border-color: rgba(255,71,87,0.6);
      animation: shake 0.4s ease;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)}
    }
    .splash-btn {
      width: 100%;
      background: linear-gradient(135deg, rgba(0,212,255,0.15), rgba(0,136,187,0.15));
      border: 1px solid rgba(0,212,255,0.3);
      border-radius: 6px;
      padding: 11px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; color: #00d4ff;
      cursor: pointer; text-transform: uppercase;
      transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .splash-btn:hover {
      background: linear-gradient(135deg, rgba(0,212,255,0.25), rgba(0,136,187,0.25));
      border-color: rgba(0,212,255,0.55);
      box-shadow: 0 0 20px rgba(0,212,255,0.15);
    }
    .splash-err {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 1px;
      color: #ff4757; height: 14px;
    }
    .splash-overlay {
      position: absolute; inset: 0;
      background: rgba(2,6,14,0.72);
      backdrop-filter: blur(1px);
    }
    .splash-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 0;
    }
    .splash-scan {
      position: absolute; bottom: 32px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px; letter-spacing: 2px; color: #1e3550;
    }
  </style>
</head>
<body>

<div class="splash" id="splash">
  <div class="splash-overlay"></div>
  <div class="splash-content">
    <div style="font-family:'Orbitron',sans-serif;font-size:58px;font-weight:900;letter-spacing:16px;color:#fff;text-shadow:0 0 40px rgba(0,212,255,0.6),0 0 80px rgba(0,212,255,0.2);margin-bottom:48px;text-align:center;">ORION</div>
    <div class="splash-form">
      <div class="splash-label">Access Passphrase</div>
      <input class="splash-input" id="splash-input" type="password"
        placeholder="· · · · · · · ·"
        onkeydown="if(event.key==='Enter')checkPass()">
      <div class="splash-err" id="splash-err"></div>
      <button class="splash-btn" onclick="checkPass()">Authenticate →</button>
    </div>
    <div class="splash-scan">APPLIED CONCEPTS INC — AUTHORIZED ACCESS ONLY</div>
  </div>
